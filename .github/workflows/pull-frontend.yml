name: Pull Frontend Build

on:
  workflow_dispatch:
  # Schedule to pull frontend build periodically (optional)
  # schedule:
  #   - cron: '0 */6 * * *'

jobs:
  pull-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Clone frontend and build
        run: |
          cd ..
          rm -rf lunchOrderFrontend_temp 2>/dev/null || true
          git clone --depth 1 https://github.com/ChrisLinOvO/lunchOrderFrontend.git lunchOrderFrontend_temp
          cd lunchOrderFrontend_temp
          npm install --legacy-peer-deps
          npm run build
          cd ..
          rm -rf lunchOrderBackend/public/build
          mv lunchOrderFrontend_temp/build lunchOrderBackend/public/build
          rm -rf lunchOrderFrontend_temp

      - name: Create PR if there are changes
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repo: ChrisLinOvO/lunchOrderBackend
          branch: ai/pull-frontend-build
          title: "chore: pull latest frontend build"
          base: master
          delete-branch: true
